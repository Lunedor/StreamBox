<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Box</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="filter-styles.css">
</head>
<header>
	<button class="back-btn" onclick="goBack()">
		<i class="material-icons">home</i> Home
	</button>
</header>
<body>
	<div id="filterContainer">
		<select id="genreFilter">
			<option value="">Select Genre</option>
		</select>
		<select id="yearFilter">
			<option value="">Select Year</option>
		</select>
		<select id="endYearFilter">
			<option value="">Select Year</option>
			<!-- Add options for end year dynamically in JavaScript -->
		</select>
		<select id="voteAverageFilter">
			<option value="">Rating</option>
			<!-- Add options for vote average dynamically in JavaScript -->
		</select>
		<button id="applyButton" onclick="applyFilters()">Apply Filters</button>
	</div>
    <div id="resultsContainer" class="movie-results"></div>
    <div id="pagination">
        <button onclick="previousPage()">Prev</button>
        <input type="text" id="currentPage" value="1"/> of <span id="totalPages"></span>

        <button onclick="nextPage()">Next</button>
    </div>
    <script src="common.js" defer></script>
    <script src="filter-script.js" defer></script>
</body>
</html>
